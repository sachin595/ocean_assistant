<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Cruises — Onboard Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <!-- Login view -->
  <section id="login-view" class="login-view">
    <svg class="chart-grid" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
          <path d="M0 0H36M0 0V36" fill="none" stroke="currentColor" stroke-width="0.5"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#grid)"/>
    </svg>
    <svg class="compass-mark" viewBox="0 0 200 200" aria-hidden="true">
      <circle cx="100" cy="100" r="86" fill="none" stroke="currentColor" stroke-width="1"/>
      <circle cx="100" cy="100" r="60" fill="none" stroke="currentColor" stroke-width="0.6"/>
      <path d="M100 14V186M14 100H186" stroke="currentColor" stroke-width="0.6"/>
      <path d="M100 30L108 100L100 170L92 100Z" fill="currentColor"/>
      <path d="M30 100L100 92L170 100L100 108Z" fill="none" stroke="currentColor" stroke-width="0.6"/>
    </svg>

    <div class="chart-card login-card">
      <span class="crop crop-tl" aria-hidden="true"></span>
      <span class="crop crop-tr" aria-hidden="true"></span>
      <span class="crop crop-bl" aria-hidden="true"></span>
      <span class="crop crop-br" aria-hidden="true"></span>

      <p class="plate-code">FIG. 01 — GUEST ACCESS</p>
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="27" fill="none" stroke="currentColor" stroke-width="1.4"/>
          <path d="M14 36c5-4 10-4 15 0s10 4 15 0" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M32 14v8M32 42v8M14 32h8M42 32h8" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </div>
      <h1>Ocean Cruises</h1>
      <p class="tagline">Onboard assistant — ship information, your account,
        and specialty dining, charted in one conversation.</p>

      <form id="login-form" autocomplete="off">
        <label for="guest-id">Guest ID <span class="hint">— printed on your cruise card</span></label>
        <input id="guest-id" name="guest-id" type="text" placeholder="e.g. G100005"
               spellcheck="false" required>
        <button type="submit" id="login-button">Step aboard</button>
        <p id="login-error" class="login-error" role="alert" hidden></p>
      </form>
    </div>
  </section>

  <!-- Chat view -->
  <section id="chat-view" class="chat-view hidden">
    <header class="chat-header">
      <div class="brand">
        <span class="brand-mark small" aria-hidden="true">
          <svg viewBox="0 0 64 64">
            <circle cx="32" cy="32" r="27" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M14 36c5-4 10-4 15 0s10 4 15 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <div class="brand-text">
          <span class="brand-name">Ocean Cruises</span>
          <span class="brand-sub">Onboard log</span>
        </div>
      </div>
      <div class="header-right">
        <span id="guest-chip" class="guest-chip"></span>
        <button id="new-conversation" class="ghost-button" type="button">New conversation</button>
        <button id="logout-button" class="ghost-button" type="button">Log out</button>
      </div>
    </header>

    <main id="messages" class="messages" aria-live="polite"></main>

    <div id="suggestions" class="suggestions">
      <button class="chip" type="button">What time does the pool close?</button>
      <button class="chip" type="button">How much have I spent so far?</button>
      <button class="chip" type="button">Do I have any dinner reservations coming up?</button>
      <button class="chip" type="button">Book a table for two tomorrow at 7 PM</button>
    </div>

    <footer class="composer">
      <form id="chat-form" autocomplete="off">
        <input id="chat-input" type="text" placeholder="Ask about the ship, your account, or dining…"
               maxlength="2000" autocomplete="off">
        <button type="submit" id="send-button" aria-label="Send">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path d="M3 12l17-8-6.5 8L20 20 3 12z" fill="currentColor"/>
          </svg>
        </button>
      </form>
    </footer>
  </section>

  <div id="toast" class="toast" role="status" hidden></div>

  <script src="/static/app.js"></script>
</body>
</html>
